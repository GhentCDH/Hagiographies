name: Build and publish to GHCR

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/ghentcdh/hagiographies
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: kottster/
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # KOTTSTER_BASE_PATH is baked in at build time (Next.js constraint).
          # Set vars.KOTTSTER_BASE_PATH in the repo/environment settings.
          # Defaults to "" (root) if not set, so local dev is unaffected.
          build-args: |
            KOTTSTER_BASE_PATH=${{ vars.KOTTSTER_BASE_PATH || '' }}
          cache-from: type=registry,ref=ghcr.io/ghentcdh/hagiographies:buildcache
          cache-to: type=registry,ref=ghcr.io/ghentcdh/hagiographies:buildcache,mode=max
