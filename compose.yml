services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    env_file:
      - dev.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  # ── Data Management (Kottster) ─────────────────────────────────────────────
  data-management:
    build:
      context: .
      dockerfile: kottster/Dockerfile
    volumes:
      - ./kottster/app:/app/app
      - ./data:/data
    env_file:
      - dev.env
      - path: .env
        required: false
    ports:
      - "5480:5480"
      - "5481:5481"
    depends_on:
      postgres:
        condition: service_healthy

  data-management-prd:
    build:
      context: .
      dockerfile: kottster/prd.Dockerfile
    volumes:
      - ./data:/data
    env_file:
      - dev.env
      - path: .env
        required: false
    ports:
      - "5490:5480"
      - "5491:5481"
    depends_on:
      postgres:
        condition: service_healthy

  utils:
    build:
      context: .
      dockerfile: utils/Dockerfile
    volumes:
      - ./utils:/app/
      - ./data:/data
    env_file:
      - dev.env
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy

  # ── Gateway & Data Publishing (Caddy) ──────────────────────────────────────
  gateway:
    image: caddy:2-alpine
    ports:
      - "9160:80"
    volumes:
      - ./caddy/:/etc/caddy/:ro
      - ./local-map:/srv/local-map:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: always

volumes:
  caddy-data:
  caddy-config:
  postgres-data: