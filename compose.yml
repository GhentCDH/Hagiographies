services:
  # ── Data Management (Kottster) ─────────────────────────────────────────────
  data-management:
    build:
      context: .
      dockerfile: docker/kottster.Dockerfile
    volumes:
      - ./kottster/app:/app/app
      - ./data:/data
    env_file:
      - dev.env
    ports:
      - "5480:5480"
      - "5481:5481"
      
  utils:
    build:
      context: .
      dockerfile: docker/utils.Dockerfile
    volumes:
      - ./utils:/app/
      - ./data:/data
      - ./local-map:/local-map
    env_file:
      - dev.env

  # ── Gateway & Data Publishing (Caddy) ──────────────────────────────────────
  gateway:
    image: caddy:2-alpine
    ports:
      - "9160:80"
    volumes:
      - ./caddy/:/etc/caddy/:ro
      - ./local-map:/srv/local-map:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: always

volumes:
  caddy-data:
  caddy-config:
