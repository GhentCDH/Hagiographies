<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hagiographies</title>
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ── Design system ─────────────────────────────────────────── */
    :root {
      --bg:          #0d1117;
      --bg-2:        #161b22;
      --bg-3:        #1c2330;
      --border:      #30363d;
      --border-2:    #21262d;
      --text:        #e6edf3;
      --text-2:      #8b949e;
      --text-3:      #484f58;
      --accent:      #e6a817;     /* amber */
      --accent-dim:  #7a5800;
      --blue:        #388bfd;     /* Hagiographies points */
      --blue-dim:    #1f4f8b;
      --red:         #f85149;
      --green:       #3fb950;
      --sidebar:     380px;
      --radius:      6px;
      --mono:        'IBM Plex Mono', monospace;
      --sans:        'IBM Plex Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
    }

    /* ── Layout ────────────────────────────────────────────────── */
    #app { display: flex; height: 100vh; }

    #map {
      flex: 1;
      position: relative;
    }

    #sidebar {
      width: var(--sidebar);
      min-width: var(--sidebar);
      height: 100vh;
      background: var(--bg-2);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Sidebar header ─────────────────────────────────────────── */
    .s-header {
      padding: 16px 18px 0;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .s-brand {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 14px;
    }

    .s-brand .logo-bantu {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--blue);
      letter-spacing: .04em;
    }

    .mode-tabs {
      display: flex;
      gap: 0;
      margin: 0 -18px;
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      border-top: 2px solid transparent;
      padding: 9px 0;
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text-2);
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }

    .tab-btn:hover { color: var(--text); }

    .tab-btn.active[data-mode="hagiographies"] { color: var(--blue); border-top-color: var(--blue); }
    .tab-btn.active[data-mode="search"] { color: var(--accent); border-top-color: var(--accent); }

    /* ── Scrollable panel area ──────────────────────────────────── */
    .panel {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
    }
    .panel.active { display: flex; }

    .panel-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 16px 18px;
    }
    .panel-scroll::-webkit-scrollbar { width: 5px; }
    .panel-scroll::-webkit-scrollbar-track { background: transparent; }
    .panel-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Empty state ────────────────────────────────────────────── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 180px;
      color: var(--text-3);
      font-size: 13px;
      text-align: center;
      gap: 8px;
    }
    .empty-state svg { opacity: .3; }

    /* ── Lists and Tables ──────────────────────────────────────── */
    .variety-name {
      font-size: 20px;
      font-weight: 600;
      margin: 0 0 8px;
      line-height: 1.2;
    }

    .badge {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: var(--bg-3);
      color: var(--text-2);
      display: inline-block;
      margin-bottom: 4px;
    }
    .badge-blue { background: #0c2040; border-color: var(--blue-dim); color: var(--blue); }
    .badge-accent { background: #403000; border-color: var(--accent-dim); color: var(--accent); }

    .entries-header {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--text-3);
      margin: 0 0 8px;
    }

    .entry-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12.5px;
    }
    .entry-table th {
      text-align: left;
      padding: 6px 8px;
      background: var(--bg-3);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      font-weight: 500;
      color: var(--text-2);
      letter-spacing: .04em;
    }
    .entry-table td {
      padding: 7px 8px;
      border-bottom: 1px solid var(--border-2);
      vertical-align: top;
    }

    /* Klikbare rijen */
    .clickable-row {
      cursor: pointer;
      transition: background 0.15s;
    }
    .clickable-row:hover td {
      background: var(--bg-3);
      border-bottom-color: var(--blue);
    }
    .entry-table td.term {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
    }

    /* ── Detail overlay (Text specific) ────────────────────────── */
    .text-detail-container {
      background: var(--bg-2);
      animation: fadeIn 0.2s;
    }
    .td-header {
      font-family: var(--mono);
      color: var(--text-2);
      font-size: 11px;
      margin-bottom: 4px;
    }
    .td-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--blue);
      margin-bottom: 12px;
      line-height: 1.3;
    }
    .td-section {
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 12px;
    }
    .td-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-3);
      margin-bottom: 4px;
      font-weight: 600;
    }
    .td-value {
      font-size: 13px;
      color: var(--text);
      margin-bottom: 10px;
    }
    .td-value:last-child { margin-bottom: 0; }

    /* ── Map controls & Legend ──────────────────────────────────── */
    .maplibregl-popup-content {
      background: var(--bg-2) !important;
      border: 1px solid var(--border) !important;
      border-radius: var(--radius) !important;
      padding: 0 !important;
      box-shadow: 0 4px 20px rgba(0,0,0,.5) !important;
    }
    .maplibregl-popup-tip { display: none; }
    .popup-inner { padding: 10px 12px; min-width: 160px; }
    .popup-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
    .popup-sub { font-size: 11px; color: var(--text-2); }
    .popup-blr { margin-top: 5px; font-family: var(--mono); font-size: 11px; color: var(--accent); }

    #map-legend {
      position: absolute;
      bottom: 32px;
      left: 12px;
      background: rgba(13,17,23,.88);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      font-size: 11px;
      backdrop-filter: blur(4px);
      pointer-events: none;
    }
    .legend-row { display: flex; align-items: center; gap: 8px; color: var(--text-2); margin-bottom: 6px; }
    .legend-row:last-child { margin-bottom: 0; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .legend-cluster { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid #30363d; }

    .btn-ghost {
      padding: 6px 10px;
      background: none;
      color: var(--text-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--text-2); }

    /* Search Filters Layout (Beknopt gehouden voor dit voorbeeld) */
    .sub-tabs { display: flex; gap: 10px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--border-2); }
    .sub-tab-btn { background: none; border: 1px solid transparent; color: var(--text-2); font-size: 11px; font-family: var(--mono); cursor: pointer; padding: 3px 6px; border-radius: 4px; }
    .sub-tab-btn.active { color: var(--accent); border-color: var(--accent-dim); background: #2a2000; }
    .filter-group { margin-bottom: 12px; }
    .filter-group label { display: block; font-size: 10px; color: var(--text-3); text-transform: uppercase; margin-bottom: 4px; font-weight: 500; }
    .filter-group select, .filter-group input[type="text"] { width: 100%; background: var(--bg-3); border: 1px solid var(--border); color: var(--text); padding: 6px 8px; border-radius: var(--radius); font-size: 12px; }
    .filter-actions { display: flex; gap: 8px; margin-top: 12px; }
    .btn-primary { flex: 1; padding: 8px; background: var(--accent); color: #000; border: none; border-radius: var(--radius); font-family: var(--mono); font-size: 12px; font-weight: 500; cursor: pointer; }
    
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>

<body>

<div id="app">
  <div id="map">
    <div id="map-legend">
      <div class="legend-row">
        <div class="legend-cluster" style="background:#2d5fa6"></div>
        Groep van plaatsen (getal = aantal)
      </div>
      <div class="legend-row">
        <div class="legend-dot" style="background:#388bfd"></div>
        Individuele herkomstplaats
      </div>
      <div class="legend-row" id="legend-match" style="display:none">
        <div class="legend-dot" style="background:#f0c040;box-shadow:0 0 5px #f0c040"></div>
        Zoekresultaat
      </div>
    </div>
  </div>

  <div id="sidebar">
    <div class="s-header">
      <div class="s-brand"><span class="logo-bantu">HAGIOGRAPHIES</span></div>
      <div class="mode-tabs">
        <button class="tab-btn active" data-mode="hagiographies" onclick="setMode('hagiographies')">Lijst</button>
        <button class="tab-btn" data-mode="search" onclick="setMode('search')">Zoeken</button>
      </div>
    </div>

    <div class="panel active" id="panel-hagiographies">
      <div class="panel-scroll" id="hagiographies-content">
        <div class="empty-state">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          Klik op een plaats op de kaart om de teksten te zien.
        </div>
      </div>
    </div>

    <div class="panel" id="panel-search">
      <div style="padding:14px 18px 0; flex-shrink:0; border-bottom:1px solid var(--border-2);">
        <div class="sub-tabs">
          <button class="sub-tab-btn active" data-sub="tekst" onclick="setSubTab('tekst')">Tekst</button>
          <button class="sub-tab-btn" data-sub="handschrift" onclick="setSubTab('handschrift')">Handschrift</button>
        </div>

        <div id="search-filter-section">
          <div class="sub-panel active" id="sub-panel-tekst">
            <div class="filter-group">
              <label>Zoeken</label>
              <input type="text" id="f-query" placeholder="Titel, BHL of auteur...">
            </div>
            <div style="display:flex; gap:10px;">
              <div class="filter-group" style="flex:1">
                <label>Aartsbisdom</label>
                <select id="f-arch"><option value="">Alle</option></select>
              </div>
              <div class="filter-group" style="flex:1">
                <label>Bisdom</label>
                <select id="f-bish"><option value="">Alle</option></select>
              </div>
            </div>
          </div>
          <div class="sub-panel" id="sub-panel-handschrift" style="display:none">
            <div class="filter-group">
              <label>Eeuw</label>
              <select id="f-century"><option value="">Alle</option></select>
            </div>
            <div class="filter-group">
              <label>Herkomst</label>
              <select id="f-prov"><option value="">Alle</option></select>
            </div>
          </div>
          <div class="filter-actions" style="margin-bottom:14px">
            <button class="btn-primary" onclick="performSearch()">Filteren</button>
            <button class="btn-ghost" onclick="resetFilter()">Wis</button>
          </div>
        </div>
      </div>

      <div class="panel-scroll" id="search-results">
        <div class="empty-state" id="evo-empty">Voer een zoekterm in om resultaten te zien.</div>
        <div id="evo-result-body" style="display:none">
          <div id="evo-count" style="font-family:var(--mono); font-size:11px; color:var(--text-2); margin-bottom:10px"></div>
          <div id="evo-list-var"></div>
        </div>
        <div id="evo-detail" style="display:none"></div>
      </div>
    </div>
  </div></div><script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/pmtiles@4/dist/pmtiles.js"></script>
<script src="https://unpkg.com/@protomaps/basemaps@5/dist/basemaps.js"></script>

<script>
/* ═══════════════════════════════════════════════════════════════
   State
 ═══════════════════════════════════════════════════════════════ */
let allFeatures = [];
let searchResults = null;
let popup = null;
let currentMode = 'hagiographies';
let _activeTextList = []; // Bewaart de huidige lijst teksten voor detailweergave
let _lastFilter = {};

const protocol = new pmtiles.Protocol();
maplibregl.addProtocol("pmtiles", protocol.tile);

const map = new maplibregl.Map({
  container: "map", center: [5, 48], zoom: 4,
  style: {
    version: 8,
    glyphs:  "https://protomaps.github.io/basemaps-assets/fonts/{fontstack}/{range}.pbf",
    sprite:  "https://protomaps.github.io/basemaps-assets/sprites/v4/light",
    sources: {
      protomaps: {
        type: "vector", url: `pmtiles:///local-map/data/world.pmtiles`,
        attribution: '<a href="https://protomaps.com">Protomaps</a> © OSM',
      }
    },
    layers: basemaps.layers("protomaps", basemaps.namedFlavor("dark"), { lang: "en" }),
  },
});
map.addControl(new maplibregl.NavigationControl());

/* ═══════════════════════════════════════════════════════════════
   Data loading & Map Layers
 ═══════════════════════════════════════════════════════════════ */
map.on('load', async () => {
  const geoRes = await fetch(`local-map/data/hagiographies_map.geojson`).then(r => r.ok ? r.json() : null);
  if (geoRes) {
    allFeatures = geoRes.features;
    initFilterDropdowns(geoRes);
    initMapLayers(geoRes);
  }
});

function initFilterDropdowns(geojson) {
  const arches = new Set(), bishes = new Set(), centuries = new Set(), provs = new Set();
  geojson.features.forEach(f => {
    const texts = typeof f.properties.texts === 'string' ? JSON.parse(f.properties.texts) : f.properties.texts;
    texts.forEach(t => {
      if (t.arch) arches.add(t.arch);
      if (t.bish) bishes.add(t.bish);
      if (t.centuries) t.centuries.forEach(c => centuries.add(c));
      if (t.provenances) t.provenances.forEach(p => provs.add(p));
    });
  });
  populateSelect('f-arch', arches); populateSelect('f-bish', bishes);
  populateSelect('f-century', centuries); populateSelect('f-prov', provs);
}

function populateSelect(id, set) {
  const s = document.getElementById(id);
  if (!s) return;
  Array.from(set).filter(x => x).sort().forEach(item => {
    s.appendChild(new Option(item, item));
  });
}

function initMapLayers(geojson) {
  const emptyFC = { type: 'FeatureCollection', features: [] };

  map.addSource('hagiographies', { type: 'geojson', data: geojson, cluster: true, clusterMaxZoom: 12, clusterRadius: 45 });
  map.addSource('evo-dim', { type: 'geojson', data: emptyFC });
  map.addSource('evo-match', { type: 'geojson', data: emptyFC });

  // Clusters
  map.addLayer({
    id: 'h-clusters', type: 'circle', source: 'hagiographies', filter: ['has', 'point_count'],
    paint: { 'circle-color': ['step', ['get', 'point_count'], '#2d5fa6', 15, '#1e7a8c', 50, '#155e75'], 'circle-radius': ['step', ['get', 'point_count'], 18, 15, 24, 50, 30], 'circle-stroke-width': 1.5, 'circle-stroke-color': '#30363d' }
  });
  map.addLayer({
    id: 'h-cluster-label', type: 'symbol', source: 'hagiographies', filter: ['has', 'point_count'],
    layout: { 'text-field': '{point_count_abbreviated}', 'text-size': 12 }, paint: { 'text-color': '#fff' }
  });

  // Points
  map.addLayer({
    id: 'h-points', type: 'circle', source: 'hagiographies', filter: ['!', ['has', 'point_count']],
    paint: { 'circle-color': '#388bfd', 'circle-radius': 7, 'circle-stroke-width': 1.5, 'circle-stroke-color': '#0d1117' }
  });

  // Search Results
  map.addLayer({ id: 'evo-dim', type: 'circle', source: 'evo-dim', paint: { 'circle-color': '#2a2d33', 'circle-radius': 6, 'circle-stroke-width': 1, 'circle-stroke-color': '#1c2330' } });
  map.addLayer({ id: 'evo-match', type: 'circle', source: 'evo-match', paint: { 'circle-color': '#f0c040', 'circle-radius': 8, 'circle-stroke-width': 2, 'circle-stroke-color': '#0d1117' } });

  // Interactions
  map.on('click', 'h-clusters', e => {
    const f = map.queryRenderedFeatures(e.point, { layers: ['h-clusters'] });
    const cid = f[0].properties.cluster_id;
    map.getSource('hagiographies').getClusterExpansionZoom(cid, (err, zoom) => {
      if (!err) map.easeTo({ center: f[0].geometry.coordinates, zoom: zoom + 1 });
    });
  });

  // Cluster Hover Uitleg
  map.on('mouseenter', 'h-clusters', e => {
    map.getCanvas().style.cursor = 'pointer';
    const count = e.features[0].properties.point_count;
    if (popup) popup.remove();
    popup = new maplibregl.Popup({ closeButton: false, offset: 15 })
      .setLngLat(e.features[0].geometry.coordinates)
      .setHTML(`<div class="popup-inner"><div class="popup-name">Groep van ${count} plaatsen</div><div class="popup-sub">Klik om in te zoomen</div></div>`)
      .addTo(map);
  });
  map.on('mouseleave', 'h-clusters', () => { map.getCanvas().style.cursor = ''; if (popup) popup.remove(); });

  // Point Clicks
  map.on('click', 'h-points', e => handlePointClick(e.features[0]));
  map.on('click', 'evo-match', e => handlePointClick(e.features[0]));
  
  ['h-points', 'evo-match'].forEach(l => {
    map.on('mouseenter', l, () => map.getCanvas().style.cursor = 'pointer');
    map.on('mouseleave', l, () => map.getCanvas().style.cursor = '');
  });
}

// 1. Zorgt voor de juiste zoom op de kaart als je op een bolletje klikt
function handlePointClick(feature) {
  const props = feature.properties;
  const texts = typeof props.texts === 'string' ? JSON.parse(props.texts) : props.texts;
  
  // Dwing het inzoomen af naar niveau 12 (tenzij de gebruiker al verder is ingezoomd)
  const targetZoom = map.getZoom() < 12 ? 12 : map.getZoom();
  
  map.flyTo({ 
    center: feature.geometry.coordinates, 
    zoom: targetZoom,
    speed: 1.2,
    essential: true // Negeert browser instellingen voor verminderde beweging
  });
  
  if (currentMode === 'search') {
    // Zoek het ID op in de lijst
    showSearchVarietyDetail(props.id);
  } else {
    showHagiographiesDetail(props, texts);
  }
}

/* ═══════════════════════════════════════════════════════════════
   Sidebar Rendering
 ═══════════════════════════════════════════════════════════════ */
function showHagiographiesDetail(props, texts) {
  _activeTextList = texts; // Opslaan voor detailweergave
  const rows = buildTableRows(texts);
  document.getElementById('hagiographies-content').innerHTML = `
    <div id="list-view">
      <div class="variety-name">${escHtml(props.name)}</div>
      <div class="entries-header" style="margin-bottom:12px">${texts.length} Teksten op deze locatie</div>
      <table class="entry-table">
        <thead><tr><th>BHL</th><th>Tekst / Auteur</th><th>Datering</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div id="single-text-view" style="display:none"></div>
  `;
}

function buildTableRows(texts) {
  return texts.map((t, idx) => {
    const badges = [];
    if (t.source_type) badges.push(`<span class="badge badge-accent">${t.source_type}</span>`);
    if (t.collections) t.collections.forEach(c => badges.push(`<span class="badge badge-blue">${c}</span>`));

    return `
      <tr class="clickable-row" onclick="showTextDetail(${idx})">
        <td class="term">
          <strong>${escHtml(t.bhl || '-')}</strong>
          <div style="margin-top:4px">${badges.join(' ')}</div>
        </td>
        <td>
          <div style="font-weight:500; color:var(--text)">${escHtml(t.title || 'Onbekend')}</div>
          <div style="font-size:11px; color:var(--text-3); margin-top:2px">${escHtml(t.author || '')}</div>
        </td>
        <td>${escHtml(t.dating || '-')}</td>
      </tr>`;
  }).join('');
}

// Open de indiviuele tekst weergave
function showTextDetail(index) {
  const t = _activeTextList[index];
  
  const geoTags = [t.arch ? `Aartsbisdom: ${t.arch}` : '', t.bish ? `Bisdom: ${t.bish}` : ''].filter(x=>x).join('<br>');
  const provs = (t.provenances || []).join(', ') || '-';
  const edities = (t.edition_refs || []).join('<br>') || 'Geen gekende edities';
  
  const html = `
    <div class="text-detail-container">
      <button class="btn-ghost" style="margin-bottom:16px" onclick="backToList()">← Terug naar lijst</button>
      
      <div class="td-header">BHL ${escHtml(t.bhl || 'Onbekend')}</div>
      <div class="td-title">${escHtml(t.title || 'Zonder titel')}</div>
      
      <div class="td-section">
        <div class="td-label">Auteur & Datering</div>
        <div class="td-value">${escHtml(t.author || 'Onbekend')} <span style="color:var(--text-3)">•</span> ${escHtml(t.dating || 'Geen datering')}</div>
        
        <div class="td-label">Karakteristieken</div>
        <div class="td-value">
          Type: ${escHtml(t.source_type || '-')} <br>
          Subtype: ${escHtml(t.subtype || '-')}
        </div>
      </div>

      <div class="td-section">
        <div class="td-label">Geografie & Herkomst</div>
        <div class="td-value" style="font-size:12px; color:var(--text-2)">
          ${geoTags ? geoTags + '<br><br>' : ''}
          <strong>Gevonden in (Provenance):</strong><br> ${escHtml(provs)}
        </div>
      </div>

      <div class="td-section">
        <div class="td-label">Moderne Edities</div>
        <div class="td-value" style="font-size:11px; font-family:var(--mono); color:var(--text-2)">
          ${edities}
        </div>
      </div>
    </div>
  `;

  // Zoek uit in welk panel we zitten
  const container = currentMode === 'search' ? document.getElementById('evo-detail') : document.getElementById('hagiographies-content');
  
  // Verberg lijst, toon detail
  container.querySelector('#list-view').style.display = 'none';
  const detailView = container.querySelector('#single-text-view');
  detailView.innerHTML = html;
  detailView.style.display = 'block';
}

function backToList() {
  const container = currentMode === 'search' ? document.getElementById('evo-detail') : document.getElementById('hagiographies-content');
  container.querySelector('#single-text-view').style.display = 'none';
  container.querySelector('#list-view').style.display = 'block';
}

/* ═══════════════════════════════════════════════════════════════
   Mode & Search (Beknopt)
 ═══════════════════════════════════════════════════════════════ */
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === `panel-${mode}`));
  
  if (mode === 'hagiographies') {
    map.setLayoutProperty('h-clusters', 'visibility', 'visible');
    map.setLayoutProperty('h-cluster-label', 'visibility', 'visible');
    map.setLayoutProperty('h-points', 'visibility', 'visible');
    map.setLayoutProperty('evo-dim', 'visibility', 'none');
    map.setLayoutProperty('evo-match', 'visibility', 'none');
    document.getElementById('legend-match').style.display = 'none';
  } else {
    map.setLayoutProperty('h-clusters', 'visibility', 'none');
    map.setLayoutProperty('h-cluster-label', 'visibility', 'none');
    map.setLayoutProperty('h-points', 'visibility', 'none');
    if (searchResults) {
      map.setLayoutProperty('evo-dim', 'visibility', 'visible');
      map.setLayoutProperty('evo-match', 'visibility', 'visible');
      document.getElementById('legend-match').style.display = 'flex';
    }
  }
}

function setSubTab(sub) {
  document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.toggle('active', b.dataset.sub === sub));
  document.querySelectorAll('.sub-panel').forEach(p => p.style.display = p.id === `sub-panel-${sub}` ? 'block' : 'none');
}

// 2. Aangepast zodat de onclick in de lijst netjes alleen het ID doorgeeft
function performSearch() {
  const q = document.getElementById('f-query').value.toLowerCase();
  const arch = document.getElementById('f-arch').value;
  const bish = document.getElementById('f-bish').value;
  
  if (!q && !arch && !bish) { resetFilter(); return; }

  const matched = [], unmatched = [];
  allFeatures.forEach(f => {
    const texts = typeof f.properties.texts === 'string' ? JSON.parse(f.properties.texts) : f.properties.texts;
    const isMatch = texts.some(t => {
      if (q && !((t.title||'').toLowerCase().includes(q) || (t.bhl||'').toLowerCase().includes(q) || (t.author||'').toLowerCase().includes(q))) return false;
      if (arch && t.arch !== arch) return false;
      if (bish && t.bish !== bish) return false;
      return true;
    });
    if (isMatch) matched.push(f); else unmatched.push(f);
  });

  searchResults = { matched, unmatched };
  map.getSource('evo-dim').setData({ type: 'FeatureCollection', features: unmatched });
  map.getSource('evo-match').setData({ type: 'FeatureCollection', features: matched });
  
  document.getElementById('evo-empty').style.display = 'none';
  document.getElementById('evo-detail').style.display = 'none';
  document.getElementById('evo-result-body').style.display = 'block';
  document.getElementById('evo-count').innerHTML = `<strong>${matched.length}</strong> plaatsen gevonden`;
  
  document.getElementById('evo-list-var').innerHTML = matched.map(f => `
    <div class="clickable-row" style="padding:10px; border:1px solid var(--border); border-radius:6px; margin-bottom:6px; background:var(--bg-3)" onclick="showSearchVarietyDetail(${f.properties.id})">
      <strong>${escHtml(f.properties.name)}</strong><br>
      <span style="font-size:11px; color:var(--text-2)">${f.properties.text_count} teksten</span>
    </div>
  `).join('');
  
  setMode('search');
}

// 3. Zorgt dat klikken op een item in de zoeklijst óók de kaart inzoomt
function showSearchVarietyDetail(id) {
  const f = searchResults.matched.find(x => x.properties.id === id);
  if (!f) return;
  
  const targetZoom = map.getZoom() < 12 ? 12 : map.getZoom();

  // Inzoomen op de kaart wanneer je in de zoeklijst klikt
  map.flyTo({ 
    center: f.geometry.coordinates, 
    zoom: targetZoom,
    speed: 1.2,
    essential: true
  });

  const texts = typeof f.properties.texts === 'string' ? JSON.parse(f.properties.texts) : f.properties.texts;
  _activeTextList = texts;

  document.getElementById('evo-result-body').style.display = 'none';
  const det = document.getElementById('evo-detail');
  det.style.display = 'block';
  
  det.innerHTML = `
    <div id="list-view">
      <button class="btn-ghost" style="margin-bottom:12px" onclick="document.getElementById('evo-detail').style.display='none'; document.getElementById('evo-result-body').style.display='block'">← Terug naar resultaten</button>
      <div class="variety-name">${escHtml(f.properties.name)}</div>
      <table class="entry-table" style="margin-top:10px">
        <thead><tr><th>BHL</th><th>Titel</th><th>Datering</th></tr></thead>
        <tbody>${buildTableRows(texts)}</tbody>
      </table>
    </div>
    <div id="single-text-view" style="display:none"></div>
  `;
}

function resetFilter() {
  document.getElementById('f-query').value = '';
  document.getElementById('f-arch').value = '';
  document.getElementById('f-bish').value = '';
  searchResults = null;
  map.getSource('evo-dim').setData({ type: 'FeatureCollection', features: [] });
  map.getSource('evo-match').setData({ type: 'FeatureCollection', features: [] });
  document.getElementById('evo-empty').style.display = 'flex';
  document.getElementById('evo-result-body').style.display = 'none';
  document.getElementById('evo-detail').style.display = 'none';
  document.getElementById('legend-match').style.display = 'none';
}

function escHtml(str) {
  if (!str && str !== 0) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}
</script>
