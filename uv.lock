version = "0.1.0"
source = { editable = "utils/utilities" }
dependencies = [
    { name = "python-dotenv" },
    { name = "rich" },
    { name = "sqlalchemy" },
    { name = "sqlalchemy-data-model-visualizer" },
    { name = "sqlmodel" },
]

[package.metadata]
requires-dist = [
    { name = "python-dotenv", specifier = ">=1.2.1" },
    { name = "rich", specifier = ">=14.2.0" },
    { name = "sqlalchemy", specifier = ">=2.0.46" },
    { name = "sqlalchemy-data-model-visualizer", specifier = ">=0.1.3" },
    { name = "sqlmodel", specifier = ">=0.0.27" },
]
